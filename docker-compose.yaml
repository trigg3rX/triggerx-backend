services:
  scylla-node1:
    image: scylladb/scylla
    container_name: triggerx-scylla-1
    ports:
      - "${DATABASE_DOCKER_PORT:-9042}:9042"
    volumes:
      - scylla_data_1:/var/lib/scylla
    command: --smp 1 --memory 512M --overprovisioned 1 --seeds=scylla-node1 --cluster-name triggerx_cluster
    logging:
      driver: "json-file"
    networks:
      - scylla-net

  scylla-node2:
    image: scylladb/scylla
    container_name: triggerx-scylla-2
    ports:
      - "9043:9042"
    volumes:
      - scylla_data_2:/var/lib/scylla
    command: --smp 1 --memory 512M --overprovisioned 1 --seeds=scylla-node1 --cluster-name triggerx_cluster
    depends_on:
      - scylla-node1
    logging:
      driver: "json-file"
    networks:
      - scylla-net

  # Redis for distributed locking and leader election
  redis:
    image: redis:alpine
    container_name: triggerx-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - manager-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    command: redis-server --bind 0.0.0.0 --protected-mode no

  # Primary manager instance
  manager1:
    build:
      context: .
      dockerfile: Dockerfile.manager
    container_name: triggerx-manager-1
    environment:
      - NODE_ID=manager1
      - MANAGER_RPC_PORT=6061
      - MANAGER_HA_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ADDRESS=redis:6379
      - OTHER_MANAGER_ADDRESSES=manager2:6062
    ports:
      - "6061:6061"
    volumes:
      - ./.env:/app/.env
    depends_on:
      redis:
        condition: service_healthy
      scylla-node1:
        condition: service_started
      scylla-node2:
        condition: service_started
    networks:
      - manager-net
      - scylla-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6061/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Secondary manager instance
  manager2:
    build:
      context: .
      dockerfile: Dockerfile.manager
    container_name: triggerx-manager-2
    environment:
      - NODE_ID=manager2
      - MANAGER_RPC_PORT=6062
      - MANAGER_HA_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ADDRESS=redis:6379
      - OTHER_MANAGER_ADDRESSES=manager1:6061
    ports:
      - "6062:6062"
    volumes:
      - ./.env:/app/.env
    depends_on:
      redis:
        condition: service_healthy
      manager1:
        condition: service_healthy
      scylla-node1:
        condition: service_started
      scylla-node2:
        condition: service_started
    networks:
      - manager-net
      - scylla-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6062/health"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  scylla-net:
    driver: bridge
  manager-net:
    driver: bridge

volumes:
  scylla_data_1:
  scylla_data_2:
  redis_data: